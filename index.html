<!DOCTYPE html>
<html>

<head>
    <title>NexusPC Store</title>
    <link href="./output.css" rel="stylesheet">
    <script src="./cart.js" defer></script>
</head>

<body class="bg-slate-950 text-white" onload="updateCartCount()">

<!-- NAV -->
<nav class="fixed w-full bg-black/40 backdrop-blur-md border-b border-white/10 z-50">
    <div class="max-w-7xl mx-auto flex justify-between px-6 py-4">
        <h1 class="text-blue-400 font-bold text-2xl">NexusPC</h1>

        <div class="flex gap-6 text-gray-300">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
            <a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
        </div>
    </div>
</nav>

<!-- HERO -->
<section class="pt-32 px-6 pb-20">
    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-10 items-center">

        <div>
            <h1 class="text-6xl font-extrabold">
                Build Your <span class="text-blue-400">Ultimate PC</span>
            </h1>

            <p class="text-gray-400 mt-6">
                Gaming, productivity, and creator-grade computer parts.
            </p>

            <a href="products.html"
                class="inline-block mt-8 bg-blue-600 px-6 py-3 rounded-xl">
                Shop Now
            </a>
        </div>

        <img class="rounded-3xl shadow-2xl"
            src="https://images.unsplash.com/photo-1587202372775-e229f172b9d7?auto=format&fit=crop&w=1200&q=80">

    </div>
</section>

<!-- FEATURED -->
<section class="max-w-7xl mx-auto px-6 pb-20">

    <h2 class="text-3xl font-bold mb-8">🔥 Featured Builds</h2>

    <div class="grid md:grid-cols-3 gap-8">

        <div class="bg-white/5 p-5 rounded-2xl">
            <img class="rounded-xl"
                src="https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?auto=format&fit=crop&w=800&q=80">

            <h3 class="font-bold mt-3">RTX 4070 GPU</h3>
            <p class="text-blue-400">₱35,000</p>

            <button onclick="addToCart('RTX 4070 GPU', 35000)"
                class="bg-blue-600 w-full mt-3 py-2 rounded-xl">
                Add
            </button>
        </div>

        <div class="bg-white/5 p-5 rounded-2xl">
            <img class="rounded-xl"
                src="https://images.unsplash.com/photo-1616587226960-4a03badbe8bf?auto=format&fit=crop&w=800&q=80">

            <h3 class="font-bold mt-3">Ryzen 7 CPU</h3>
            <p class="text-blue-400">₱18,500</p>

            <button onclick="addToCart('Ryzen 7 CPU', 18500)"
                class="bg-blue-600 w-full mt-3 py-2 rounded-xl">
                Add
            </button>
        </div>

        <div class="bg-white/5 p-5 rounded-2xl">
            <img class="rounded-xl"
                src="https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?auto=format&fit=crop&w=800&q=80">

            <h3 class="font-bold mt-3">RGB Keyboard</h3>
            <p class="text-blue-400">₱2,999</p>

            <button onclick="addToCart('RGB Keyboard', 2999)"
                class="bg-blue-600 w-full mt-3 py-2 rounded-xl">
                Add
            </button>
        </div>

    </div>

</section>

</body>
</html>
